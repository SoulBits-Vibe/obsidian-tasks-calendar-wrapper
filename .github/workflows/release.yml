name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

env:
  PLUGIN_ID: tasks-calendar-wrapper
  BUILD_DIR: dist

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Build
        id: build
        run: |
          npm ci
          npm test
          npm run build
          mkdir ${{ env.PLUGIN_ID }}
          cp ${{ env.BUILD_DIR }}/main.js ${{ env.BUILD_DIR }}/manifest.json ${{ env.BUILD_DIR }}/styles.css ${{ env.PLUGIN_ID }}
          zip -r ${{ env.PLUGIN_ID }}.zip ${{ env.PLUGIN_ID }}
          ls
          echo "tag_name=$(git tag --sort version:refname | tail -n 1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./${{ env.PLUGIN_ID }}.zip
            ${{ env.BUILD_DIR }}/main.js
            ${{ env.BUILD_DIR }}/manifest.json
            ${{ env.BUILD_DIR }}/styles.css
